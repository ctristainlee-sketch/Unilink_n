
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const config = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(config);
  const db = getDatabase(app);
  const linksRef = ref(db, 'public/links');

  // Atlas Diagnostic: Silently check if link is blocked and purge if so
  async function atlasPurge(id, url) {
    if(!url || url.trim().startsWith('<')) return;
    try {
      // Use no-cors to bypass CORS issues while checking reachability
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);
      await fetch(url, { mode: 'no-cors', signal: controller.signal });
      clearTimeout(timeoutId);
    } catch(e) {
      // If the fetch is aborted or fails, it's likely a dead/blocked link
      remove(ref(db, `public/links/${id}`));
    }
  }

  onValue(linksRef, (snap) => {
    const list = document.getElementById('network-list');
    list.innerHTML = '';
    snap.forEach(child => {
      const data = child.val();
      const key = child.key;
      const isCode = data.anonLink.trim().startsWith('<');
      
      const card = document.createElement('div');
      card.className = 'network-card';
      card.innerHTML = `
        <div class="meta-tag">LINK_ID: ${key.substring(0,6)}</div>
        <div class="entry-name">${data.name}</div>
        ${isCode ? 
          `<div class="code-container"><code>${data.anonLink.substring(0,100)}...</code></div>` : 
          `<div class="entry-url">${data.anonLink}</div><a href="${data.anonLink}" target="_blank" class="action-btn">ESTABLISH_UPLINK</a>`
        }
      `;
      list.appendChild(card);
      
      // Run diagnostic
      if(!isCode) atlasPurge(key, data.anonLink);
    });
  });

  window.sendBroadcast = () => {
    const n = document.getElementById('input-name').value;
    const l = document.getElementById('input-link').value;
    if(n && l) {
      push(linksRef, { 
        name: n, 
        anonLink: l,
        timestamp: Date.now() 
      });
      document.getElementById('input-name').value = '';
      document.getElementById('input-link').value = '';
    }
  };
</script>
<style>
  body { 
    margin: 0; padding: 20px; 
    background: transparent; 
    color: #fff; 
    font-family: 'Rajdhani', sans-serif;
  }

  .input-panel { 
    background: rgba(13, 18, 32, 0.9); 
    border: 1px solid rgba(0, 255, 225, 0.2); 
    padding: 30px; 
    border-radius: 12px; 
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    /* Edge Fading */
    mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
  }

  .header-text {
    font-family: 'Share Tech Mono', monospace;
    color: #00ffe1;
    font-size: 14px;
    margin-bottom: 20px;
    display: block;
    letter-spacing: 1px;
  }

  input, textarea { 
    width: 100%; 
    background: rgba(0,0,0,0.4); 
    color: #00ffe1; 
    border: 1px solid #1e3050; 
    padding: 14px; 
    margin: 10px 0; 
    border-radius: 6px; 
    box-sizing: border-box; 
    font-family: 'Share Tech Mono';
    font-size: 15px;
    outline: none;
    transition: 0.3s;
  }

  input:focus, textarea:focus { border-color: #00ffe1; background: rgba(0,0,0,0.6); }

  .broadcast-btn { 
    width: 100%; 
    background: #00ffe1; 
    color: #000;
    border: none; 
    padding: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    border-radius: 6px; 
    font-family: 'Share Tech Mono';
    font-size: 16px;
    text-transform: uppercase;
    transition: 0.3s;
  }

  .broadcast-btn:hover { background: #fff; box-shadow: 0 0 20px rgba(0, 255, 225, 0.4); }

  .network-card { 
    background: rgba(0, 0, 0, 0.5); 
    border-left: 4px solid #00ffe1; 
    padding: 20px; 
    margin-top: 15px; 
    border-radius: 8px;
    backdrop-filter: blur(5px);
  }

  .meta-tag { font-family: 'Share Tech Mono'; font-size: 10px; color: #4a6080; margin-bottom: 5px; }
  .entry-name { color: #00ffe1; font-size: 20px; font-weight: 700; }
  .entry-url { font-family: 'Share Tech Mono'; font-size: 12px; color: #5c789d; margin: 12px 0; word-break: break-all; }
  
  .action-btn { 
    display: inline-block; 
    background: transparent; 
    color: #00ffe1; 
    text-decoration: none; 
    padding: 6px 15px; 
    font-size: 12px; 
    font-weight: 700; 
    border: 1px solid #00ffe1;
    border-radius: 4px;
    font-family: 'Share Tech Mono';
    transition: 0.3s;
  }

  .action-btn:hover { background: #00ffe1; color: #000; }

  .code-container { 
    background: #050505; 
    border: 1px dashed #333; 
    padding: 12px; 
    margin-top: 15px; 
    border-radius: 4px;
    font-size: 11px;
    color: #666;
  }
</style>
</head>
<body>
  <div class="input-panel">
    <span class="header-text">// NETWORK_UPLINK_PROTOCOL</span>
    <input id="input-name" placeholder="Identity / Title">
    <textarea id="input-link" rows="2" placeholder="Destination URL or HTML Snippet"></textarea>
    <button class="broadcast-btn" onclick="sendBroadcast()">BROADCAST_SIGNAL</button>
  </div>
  <div id="network-list"></div>
</body>
</html>
