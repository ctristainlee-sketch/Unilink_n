
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // Configuration verified for Google Sites Deployment
  const firebaseConfig = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const publicLinksRef = ref(db, 'public/links');

  // Atlas Scanner: Client-side diagnostic that purges nodes blocked by firewalls
  async function runAtlasDiagnostic(id, url) {
    if(!url || url.trim().startsWith('<')) return;
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 4000);
      
      // Ping check: If it fails or is blocked, fetch throws or times out
      await fetch(url, { mode: 'no-cors', signal: controller.signal });
      clearTimeout(timeoutId);
    } catch (e) {
      console.warn(`[ATLAS_SCAN] Purging blocked node: ${id}`);
      remove(ref(db, `public/links/${id}`));
    }
  }

  onValue(publicLinksRef, (snapshot) => {
    const list = document.getElementById('network-feed');
    list.innerHTML = '';
    
    snapshot.forEach((child) => {
      const data = child.val();
      const id = child.key;
      const content = data.anonLink || "";
      const isHTML = content.trim().startsWith('<');
      
      const card = document.createElement('div');
      card.className = 'network-card';
      
      if (isHTML) {
        card.innerHTML = `
          <div class="meta-info">DATA_TYPE: SOURCE_CODE // ID: ${id.substring(0,6)}</div>
          <div class="title">${data.name}</div>
          <div class="html-viewer">${content}</div>
        `;
      } else {
        card.innerHTML = `
          <div class="meta-info">DATA_TYPE: UPLINK_URL // ID: ${id.substring(0,6)}</div>
          <div class="title">${data.name}</div>
          <div class="iframe-container">
             <iframe src="${content}" loading="lazy" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
          </div>
          <div class="card-footer">
            <a href="${content}" target="_blank" class="launch-btn">LAUNCH_EXTERNAL</a>
          </div>
        `;
        // Run scanner on URLs only
        runAtlasDiagnostic(id, content);
      }
      list.appendChild(card);
    });
  });

  window.broadcast = () => {
    const name = document.getElementById('name-input').value;
    const link = document.getElementById('link-input').value;
    if(name && link) {
      push(publicLinksRef, {
        name: name,
        anonLink: link,
        timestamp: Date.now()
      });
      document.getElementById('name-input').value = '';
      document.getElementById('link-input').value = '';
    }
  };
</script>
<style>
  :root {
    --neon: #00ffe1;
    --panel-bg: rgba(10, 15, 25, 0.95);
  }

  body { 
    margin: 0; padding: 20px; background: transparent; color: #fff; 
    font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
  }

  /* Fading edge panel design */
  .broadcast-panel { 
    background: var(--panel-bg); 
    border: 1px solid rgba(0, 255, 225, 0.2);
    padding: 30px; border-radius: 12px; margin-bottom: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
  }

  input, textarea { 
    width: 100%; background: #050505; color: var(--neon); border: 1px solid #1e3050; 
    padding: 14px; margin: 10px 0; border-radius: 6px; font-family: 'Share Tech Mono'; 
    box-sizing: border-box; outline: none; transition: 0.3s;
  }
  input:focus, textarea:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,225,0.1); }

  .broadcast-btn { 
    width: 100%; background: var(--neon); color: #000; border: none; padding: 16px; 
    font-weight: 700; cursor: pointer; border-radius: 6px; font-family: 'Share Tech Mono'; 
    text-transform: uppercase; transition: 0.3s; margin-top: 10px;
  }
  .broadcast-btn:hover { filter: brightness(1.2); transform: scale(1.01); }

  .network-card { 
    background: rgba(0, 0, 0, 0.8); border-left: 4px solid var(--neon); 
    padding: 25px; margin-top: 25px; border-radius: 8px; 
    border-top: 1px solid rgba(255,255,255,0.05);
    border-right: 1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .meta-info { font-family: 'Share Tech Mono'; font-size: 10px; color: #4a6080; letter-spacing: 1px; margin-bottom: 5px; }
  .title { color: var(--neon); font-size: 22px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
  
  .iframe-container { 
    width: 100%; height: 380px; background: #fff; border-radius: 4px; 
    overflow: hidden; margin-bottom: 15px; border: 1px solid #111;
  }
  iframe { width: 100%; height: 100%; border: none; }

  .html-viewer { 
    background: #050505; border: 1px dashed #1e3050; padding: 15px; 
    border-radius: 6px; max-height: 500px; overflow-y: auto; color: #fff;
    font-family: 'Share Tech Mono'; font-size: 13px;
  }

  .launch-btn { 
    display: inline-block; background: transparent; color: var(--neon); 
    border: 1px solid var(--neon); padding: 8px 20px; font-size: 11px; 
    font-weight: 700; border-radius: 4px; text-decoration: none; 
    font-family: 'Share Tech Mono'; transition: 0.3s;
  }
  .launch-btn:hover { background: var(--neon); color: #000; }
</style>
</head>
<body>
  <div class="broadcast-panel">
    <div style="font-family:'Share Tech Mono'; font-size:12px; color:var(--neon); margin-bottom:10px;">[ UPLINK_STATION_ACTIVE ]</div>
    <input id="name-input" placeholder="IDENTIFIER / ASSET_NAME">
    <textarea id="link-input" rows="3" placeholder="PASTE_URL_OR_HTML_SOURCE_CODE"></textarea>
    <button class="broadcast-btn" onclick="broadcast()">BROADCAST_TO_NETWORK</button>
  </div>
  <div id="network-feed"></div>
</body>
</html>
