
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Node — Atlas Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const linksRef = ref(db, `public/links`);

  let activeData = [];

  function logAtlas(msg, type = 'info') {
    const log = document.getElementById('atlas-log');
    const entry = document.createElement('div');
    entry.style.color = type === 'error' ? '#ff4d4d' : type === 'warn' ? '#ffcc00' : '#00ffe1';
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.prepend(entry);
  }

  async function runAtlasPurge() {
    logAtlas("INITIATING_SYSTEM_SCAN...", "info");
    const suspicious = [];
    
    // Stage 1: Fast Fetch (Suspicious Check)
    for (let item of activeData) {
      if (item.url.startsWith('<')) continue;
      try {
        logAtlas(`SCANNING: ${item.name}...`);
        await fetch(item.url, { mode: 'no-cors' });
      } catch (err) {
        logAtlas(`NODE_SUSPICIOUS: ${item.name}`, "warn");
        suspicious.push(item);
      }
    }

    // Stage 2: Catch Check (Hardwall/Imposter Check)
    logAtlas("ANALYZING_SUSPICIOUS_NODES...", "warn");
    for (let item of suspicious) {
      try {
        const res = await fetch(item.url, { mode: 'no-cors' });
      } catch (err) {
        logAtlas(`IMPOSTER_DETECTED: Deleting ${item.name}`, "error");
        await remove(ref(db, `public/links/${item.id}`));
      }
    }

    logAtlas("SCAN_COMPLETE. VERIFYING_UI_INTEGRITY...", "info");
    checkUICompatibility();
  }

  function checkUICompatibility() {
    const iframes = document.querySelectorAll('.test-frame');
    iframes.forEach(f => {
      const card = f.closest('.link-card');
      if (!card) return;
      
      setTimeout(() => {
        try {
          if (f.contentWindow.length === 0) {
            card.classList.add('incompatible');
            logAtlas(`UI_BLOCK_DETECTED: ${card.dataset.name} (Copy Link Only)`, "warn");
          }
        } catch (e) {}
      }, 2000);
    });
  }

  onValue(linksRef, (snapshot) => {
    const list = document.getElementById('list');
    list.innerHTML = '';
    activeData = [];
    
    snapshot.forEach((child) => {
      const data = child.val();
      const targetUrl = data.anonLink || "";
      activeData.push({ id: child.key, url: targetUrl, name: data.name });

      const card = document.createElement('div');
      card.className = 'link-card';
      card.dataset.name = data.name;
      const isHtml = targetUrl.trim().startsWith('<');
      
      if (isHtml) {
        card.innerHTML = `
          <div class="card-header"><strong>${data.name}</strong> <span class="tag">CODE</span></div>
          <div class="html-preview">${targetUrl}</div>
        `;
      } else {
        card.innerHTML = `
          <div class="card-header"><strong>${data.name}</strong> <span class="tag">URL</span></div>
          <div class="iframe-wrap">
             <iframe src="${targetUrl}" class="test-frame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
          </div>
          <div class="card-actions">
            <a href="${targetUrl}" target="_blank" class="launch-btn">LAUNCH</a>
            <button onclick="copyToClipboard('${targetUrl}')" class="copy-btn">COPY_LINK</button>
          </div>
        `;
      }
      list.appendChild(card);
    });
  });

  window.copyToClipboard = (text) => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    logAtlas("LINK_COPIED_TO_CLIPBOARD");
  };

  window.addLink = () => {
    const name = document.getElementById('name').value;
    const url = document.getElementById('url').value;
    if(name && url) {
        push(linksRef, { name, anonLink: url });
        document.getElementById('name').value = '';
        document.getElementById('url').value = '';
    }
  };

  window.runAtlasPurge = runAtlasPurge;
</script>
<style>
  /* Enable natural scrolling for Google Sites integration */
  body { 
    margin: 0; 
    padding: 20px; 
    color: #d0e8ff; 
    font-family: 'Rajdhani', sans-serif;
    background: transparent;
    overflow-y: auto;
    min-height: 100vh;
  }

  .panel { 
    background: rgba(13, 18, 32, 0.9); 
    border: 1px solid rgba(0, 255, 225, 0.2); 
    padding: 20px; 
    border-radius: 12px; 
    margin-bottom: 20px; 
    backdrop-filter: blur(10px);
    /* Fade effect at the edges */
    mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
  }

  .atlas-terminal {
    background: #000; 
    border: 1px solid #00ffe1; 
    padding: 15px; 
    border-radius: 8px;
    font-family: 'Share Tech Mono'; 
    height: 120px; 
    overflow-y: auto; 
    margin-bottom: 20px;
    font-size: 11px; 
    box-shadow: inset 0 0 10px rgba(0,255,225,0.2);
  }
  
  #atlas-log div { border-bottom: 1px solid rgba(0,255,225,0.05); padding: 2px 0; }
  
  h2 { color:#00ffe1; margin:0 0 10px 0; font-family: 'Share Tech Mono'; display: flex; justify-content: space-between; align-items: center; }
  
  .atlas-btn { 
    background: #00ffe1; color: #000; border: none; padding: 5px 15px; 
    font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 4px;
  }

  input, textarea { 
    width: 100%; background: #000; color: #00ffe1; border: 1px solid #1e3050; 
    padding: 10px; margin: 4px 0; border-radius: 4px; box-sizing: border-box; font-family: 'Share Tech Mono';
    outline: none;
  }

  /* List and Cards */
  #list {
    padding-bottom: 100px; /* Essential for scrolling past the bottom mask */
  }

  .link-card { 
    background: rgba(255, 255, 255, 0.05); 
    border-left: 3px solid #00ffe1; 
    padding: 15px; 
    margin-top: 15px; 
    border-radius: 8px; 
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  
  .link-card.incompatible { opacity: 0.4; filter: grayscale(1); }
  .link-card.incompatible .card-actions { pointer-events: auto; }

  .iframe-wrap { width: 100%; height: 250px; background: #fff; margin: 10px 0; border-radius: 4px; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; }
  
  .launch-btn, .copy-btn { 
    background: #00ffe1; color: #000; text-decoration: none; padding: 8px 15px; 
    font-weight: bold; font-size: 11px; border-radius: 3px; display: inline-block; cursor: pointer; border: none;
    font-family: 'Share Tech Mono';
  }
  .copy-btn { background: #1e3050; color: #00ffe1; margin-left: 5px; }
  .tag { font-size: 10px; border: 1px solid #00ffe1; padding: 1px 5px; border-radius: 3px; font-family: 'Share Tech Mono'; }

  .html-preview {
    background: #000; padding: 10px; border: 1px dashed #1e3050; border-radius: 4px;
    max-height: 300px; overflow: auto;
  }
</style>
</head>
<body>
  <div class="panel">
    <h2>
      NETWORK_NODES
      <button class="atlas-btn" onclick="runAtlasPurge()">RUN_ATLAS_SCAN</button>
    </h2>
    <div class="atlas-terminal" id="atlas-log"><div>SYSTEM_READY_FOR_DIAGNOSTIC</div></div>
    
    <input id="name" placeholder="IDENTIFIER">
    <textarea id="url" rows="3" placeholder="URL OR <HTML_SOURCE>"></textarea>
    <button style="width:100%; background:#00ffe1; border:none; padding:12px; margin-top:10px; font-weight:bold; cursor:pointer; font-family:'Share Tech Mono';" onclick="addLink()">PUSH_TO_NETWORK</button>
  </div>

  <div id="list"></div>
</body>
</html>
