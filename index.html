
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const config = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(config);
  const db = getDatabase(app);
  const linksRef = ref(db, 'public/links');

  // Atlas Diagnostic: Checks reachability and silently purges blocked nodes
  async function atlasDiagnostic(id, url) {
    if(!url || url.trim().startsWith('<')) return;
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 4000);
      
      // mode: 'no-cors' allows us to check if the server responds at all
      await fetch(url, { mode: 'no-cors', signal: controller.signal });
      clearTimeout(timeoutId);
    } catch(e) {
      console.warn(`[ATLAS] Link inaccessible or blocked. Purging: ${id}`);
      remove(ref(db, `public/links/${id}`));
    }
  }

  onValue(linksRef, (snap) => {
    const list = document.getElementById('network-list');
    list.innerHTML = '';
    
    snap.forEach(child => {
      const data = child.val();
      const key = child.key;
      const content = data.anonLink || "";
      const isHTML = content.trim().startsWith('<');
      
      const card = document.createElement('div');
      card.className = 'network-card';
      
      if (isHTML) {
        card.innerHTML = `
          <div class="meta-tag">SOURCE_ID: ${key.substring(0,8)}</div>
          <div class="entry-name">${data.name || 'ANON_SOURCE'}</div>
          <div class="html-container">${content}</div>
        `;
      } else {
        card.innerHTML = `
          <div class="meta-tag">LINK_ID: ${key.substring(0,8)}</div>
          <div class="entry-name">${data.name || 'ANON_LINK'}</div>
          <div class="iframe-container">
             <iframe src="${content}" loading="lazy" title="${data.name}"></iframe>
          </div>
          <a href="${content}" target="_blank" class="action-btn">EXTERNAL_UPLINK</a>
        `;
        atlasDiagnostic(key, content);
      }
      list.appendChild(card);
    });
  }, (error) => {
    console.error("Firebase Read Error:", error);
  });

  window.sendBroadcast = () => {
    const n = document.getElementById('input-name').value;
    const l = document.getElementById('input-link').value;
    if(n && l) {
      push(linksRef, { 
        name: n, 
        anonLink: l,
        timestamp: Date.now() 
      });
      document.getElementById('input-name').value = '';
      document.getElementById('input-link').value = '';
    }
  };
</script>
<style>
  body { 
    margin: 0; padding: 20px; background: transparent; color: #fff; 
    font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
  }

  .panel { 
    background: rgba(13, 18, 32, 0.95); border: 1px solid rgba(0, 255, 225, 0.3); 
    padding: 30px; border-radius: 12px; margin-bottom: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    /* Edge Fading */
    mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
  }

  input, textarea { 
    width: 100%; background: #000; color: #00ffe1; border: 1px solid #1e3050; 
    padding: 12px; margin: 10px 0; border-radius: 6px; font-family: 'Share Tech Mono'; 
    box-sizing: border-box; outline: none; transition: 0.3s;
  }
  input:focus, textarea:focus { border-color: #00ffe1; box-shadow: 0 0 10px rgba(0,255,225,0.2); }

  .broadcast-btn { 
    width: 100%; background: #00ffe1; color: #000; border: none; padding: 15px; 
    font-weight: 700; cursor: pointer; border-radius: 6px; font-family: 'Share Tech Mono'; 
    text-transform: uppercase; transition: 0.3s;
  }
  .broadcast-btn:hover { background: #fff; transform: translateY(-2px); }

  .network-card { 
    background: rgba(0, 0, 0, 0.75); border-left: 4px solid #00ffe1; 
    padding: 20px; margin-top: 25px; border-radius: 8px; 
    border-right: 1px solid rgba(0,255,225,0.1);
    border-top: 1px solid rgba(0,255,225,0.1);
    border-bottom: 1px solid rgba(0,255,225,0.1);
    backdrop-filter: blur(5px);
  }

  .meta-tag { font-family: 'Share Tech Mono'; font-size: 10px; color: #4a6080; letter-spacing: 1px; }
  .entry-name { color: #00ffe1; font-size: 22px; font-weight: 700; margin: 8px 0 15px 0; }
  
  .iframe-container { 
    width: 100%; height: 400px; background: #050505; border-radius: 4px; 
    overflow: hidden; margin-bottom: 15px; border: 1px solid #111;
  }
  iframe { width: 100%; height: 100%; border: none; background: #fff; }

  .html-container { 
    background: #050505; border: 1px solid #1a1a1a; padding: 15px; 
    border-radius: 6px; max-height: 500px; overflow-y: auto; color: #fff;
  }

  .action-btn { 
    display: inline-block; background: transparent; color: #00ffe1; 
    border: 1px solid #00ffe1; padding: 8px 18px; font-size: 11px; 
    font-weight: 700; border-radius: 4px; text-decoration: none; 
    font-family: 'Share Tech Mono'; transition: 0.3s;
  }
  .action-btn:hover { background: #00ffe1; color: #000; }
</style>
</head>
<body>
  <div class="panel">
    <div style="font-family:'Share Tech Mono'; font-size:12px; color:#00ffe1; margin-bottom:10px;">// PUBLIC_DATA_UPLINK</div>
    <input id="input-name" placeholder="IDENTIFIER / TITLE">
    <textarea id="input-link" rows="3" placeholder="DESTINATION_URL OR HTML_SOURCE_CODE"></textarea>
    <button class="broadcast-btn" onclick="sendBroadcast()">BROADCAST_TO_NETWORK</button>
  </div>
  <div id="network-list"></div>
</body>
</html>
